<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLens — 株式ファンダメンタル分析</title>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --purple: #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

/* Header */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.logo span { color: var(--text2); font-weight: 400; font-size: 14px; margin-left: 8px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.market-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text2); }
.market-badge.active { border-color: var(--accent); color: var(--accent); }

/* Main layout */
.main { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* Stats bar */
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
.stat-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--text); }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }

/* Controls */
.controls { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.search-box { flex: 1; min-width: 200px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px; outline: none; }
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text2); }
select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px; outline: none; cursor: pointer; }
select:focus { border-color: var(--accent); }
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); font-size: 14px; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }
.btn-primary:hover { opacity: 0.85; }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { color: var(--text); background: var(--bg3); }
.btn-ghost.active { color: var(--accent); border-color: var(--accent); }

/* Table */
.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.table-header-bar { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.table-title { font-size: 14px; font-weight: 600; }
.table-count { font-size: 13px; color: var(--text2); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: var(--bg3); padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); white-space: nowrap; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); }
thead th:hover { color: var(--text); }
thead th.sorted { color: var(--accent); }
thead th.sorted::after { content: ' ↓'; }
thead th.sorted.asc::after { content: ' ↑'; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 10px 12px; white-space: nowrap; }

.ticker-cell { font-weight: 700; color: var(--accent); font-size: 14px; }
.name-cell { color: var(--text2); max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
.rank-cell { font-weight: 700; color: var(--text2); font-size: 13px; width: 36px; }
.price-cell { font-weight: 600; }

/* Score bar */
.score-wrap { display: flex; align-items: center; gap: 8px; }
.score-bar { width: 60px; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.score-num { font-weight: 700; font-size: 13px; width: 26px; text-align: right; }

/* Metric cells */
.pos { color: var(--green); }
.neg { color: var(--red); }
.na { color: var(--text2); }
.sector-badge { background: var(--bg3); border-radius: 4px; padding: 2px 7px; font-size: 11px; color: var(--text2); }

/* Market tag */
.market-tag { font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 3px; }
.market-us { background: rgba(88,166,255,0.15); color: var(--accent); }
.market-jp { background: rgba(188,140,255,0.15); color: var(--purple); }

/* Pagination */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 16px; border-top: 1px solid var(--border); }
.page-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--text2); cursor: pointer; font-size: 13px; }
.page-btn:hover { color: var(--text); border-color: var(--text2); }
.page-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--text2); }
.spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-msg { background: rgba(248,81,73,0.1); border: 1px solid var(--red); border-radius: 8px; padding: 16px; color: var(--red); margin: 20px; text-align: center; }

/* Detail panel */
.detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; }
.detail-overlay.open { display: flex; align-items: center; justify-content: center; }
.detail-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; width: 640px; max-width: 95vw; max-height: 85vh; overflow-y: auto; padding: 28px; position: relative; }
.detail-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
.detail-close:hover { color: var(--text); }
.detail-ticker { font-size: 32px; font-weight: 800; color: var(--accent); }
.detail-name { color: var(--text2); font-size: 15px; margin-top: 2px; }
.detail-price { font-size: 28px; font-weight: 700; margin-top: 16px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
.detail-metric { background: var(--bg3); border-radius: 8px; padding: 12px 16px; }
.detail-metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.detail-metric-value { font-size: 20px; font-weight: 700; }
.detail-sector { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.detail-tag { background: var(--bg3); border-radius: 4px; padding: 3px 10px; font-size: 12px; color: var(--text2); }

/* Responsive */
@media (max-width: 768px) {
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .hide-mobile { display: none !important; }
  .main { padding: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">StockLens <span>株式ファンダメンタル分析</span></div>
  <div class="header-right">
    <div class="market-badge active" id="badge-us">🇺🇸 US</div>
    <div class="market-badge" id="badge-jp">🇯🇵 JP</div>
    <div class="market-badge" id="last-update"></div>
  </div>
</div>

<div class="main">
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card"><div class="stat-label">銘柄数</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">平均スコア</div><div class="stat-value" id="stat-avg-score">—</div></div>
    <div class="stat-card"><div class="stat-label">高スコア銘柄(70+)</div><div class="stat-value green" id="stat-high">—</div></div>
    <div class="stat-card"><div class="stat-label">平均PER</div><div class="stat-value" id="stat-per">—</div></div>
  </div>

  <div class="controls">
    <input class="search-box" id="search" type="text" placeholder="🔍 ティッカー・銘柄名で検索...">
    <select id="sector-filter">
      <option value="">全セクター</option>
    </select>
    <select id="sort-by">
      <option value="score">スコア順</option>
      <option value="market_cap">時価総額順</option>
      <option value="per">PER順</option>
      <option value="peg">PEG順</option>
      <option value="roe">ROE順</option>
      <option value="fcf_yield">FCF利回り順</option>
      <option value="price">株価順</option>
    </select>
    <select id="sort-dir">
      <option value="desc">高い順</option>
      <option value="asc">低い順</option>
    </select>
    <select id="market-filter">
      <option value="">全市場</option>
      <option value="US">🇺🇸 米国株</option>
      <option value="JP">🇯🇵 日本株</option>
    </select>
    <button class="btn btn-primary" onclick="loadStocks()">更新</button>
  </div>

  <div class="table-wrap">
    <div class="table-header-bar">
      <div class="table-title">📊 銘柄ランキング</div>
      <div class="table-count" id="result-count"></div>
    </div>
    <div id="table-area">
      <div class="loading"><div class="spinner"></div><br>データ読み込み中...</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" onclick="closeDetailBtn()">✕</button>
    <div class="detail-ticker" id="d-ticker"></div>
    <div class="detail-name" id="d-name"></div>
    <div class="detail-sector" id="d-tags"></div>
    <div class="detail-price" id="d-price"></div>
    <div class="detail-grid" id="d-grid"></div>
  </div>
</div>

<script>
const API = 'https://stock-analyzer-production-564c.up.railway.app';
let currentPage = 1;
let totalPages = 1;
let allSectors = new Set();
let statsCache = null;

function scoreColor(s) {
  if (s >= 75) return '#3fb950';
  if (s >= 60) return '#58a6ff';
  if (s >= 45) return '#d29922';
  return '#f85149';
}

function fmt(v, decimals=2, suffix='') {
  if (v == null || v === undefined) return '<span class="na">—</span>';
  const n = Number(v);
  if (isNaN(n)) return '<span class="na">—</span>';
  return n.toFixed(decimals) + suffix;
}

function fmtPct(v) {
  if (v == null) return '<span class="na">—</span>';
  const n = Number(v);
  if (isNaN(n)) return '<span class="na">—</span>';
  const cls = n >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${n >= 0 ? '+' : ''}${(n*100).toFixed(2)}%</span>`;
}

function fmtMktCap(v) {
  if (!v) return '<span class="na">—</span>';
  const t = v / 1e12;
  if (t >= 1) return `$${t.toFixed(2)}T`;
  const b = v / 1e9;
  return `$${b.toFixed(1)}B`;
}

function fmtPctDirect(v) {
  if (v == null) return '<span class="na">—</span>';
  const n = Number(v);
  if (isNaN(n)) return '<span class="na">—</span>';
  const cls = n >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${n >= 0 ? '+' : ''}${n.toFixed(2)}%</span>`;
}

async function loadStocks() {
  const search = document.getElementById('search').value;
  const sector = document.getElementById('sector-filter').value;
  const sortBy = document.getElementById('sort-by').value;
  const sortDir = document.getElementById('sort-dir').value;
  const market = document.getElementById('market-filter').value;

  document.getElementById('table-area').innerHTML = '<div class="loading"><div class="spinner"></div><br>データ読み込み中...</div>';

  try {
    let url = `${API}/api/v1/screener?page=${currentPage}&per_page=25&sort_by=${sortBy}&sort_dir=${sortDir}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (sector) url += `&sector=${encodeURIComponent(sector)}`;
    if (market) url += `&market=${encodeURIComponent(market)}`;

    const res = await fetch(url);
    const data = await res.json();

    if (!data.stocks) throw new Error('データ取得失敗');

    totalPages = Math.ceil(data.total / 25);
    document.getElementById('result-count').textContent = `${data.total}銘柄`;

    // Collect sectors
    data.stocks.forEach(s => { if (s.sector) allSectors.add(s.sector); });
    updateSectorFilter();

    // Stats (first load)
    if (!statsCache && data.stocks.length > 0) {
      loadStats(data.stocks, data.total);
    }

    renderTable(data.stocks, (currentPage - 1) * 25);
    renderPagination(data.total);

  } catch(e) {
    document.getElementById('table-area').innerHTML = `<div class="error-msg">⚠️ エラー: ${e.message}<br><small>バックエンド: ${API}</small></div>`;
  }
}

function loadStats(stocks, total) {
  document.getElementById('stat-total').textContent = total;

  // Load all for stats
  fetch(`${API}/api/v1/screener?per_page=200&sort_by=score&sort_dir=desc`)
    .then(r => r.json())
    .then(data => {
      const all = data.stocks;
      const scores = all.map(s => s.score).filter(s => s != null);
      const pers = all.map(s => s.per).filter(p => p != null && p > 0 && p < 200);
      const avg = arr => arr.length ? (arr.reduce((a,b) => a+b, 0)/arr.length) : null;
      const high = scores.filter(s => s >= 70).length;

      document.getElementById('stat-total').textContent = data.total || total;
      document.getElementById('stat-avg-score').textContent = avg(scores) ? avg(scores).toFixed(1) : '—';
      document.getElementById('stat-high').textContent = high;
      document.getElementById('stat-per').textContent = avg(pers) ? avg(pers).toFixed(1) : '—';
      statsCache = true;
    }).catch(() => {});

  document.getElementById('last-update').textContent = '更新: ' + new Date().toLocaleTimeString('ja-JP');
}

function renderTable(stocks, offset) {
  if (!stocks.length) {
    document.getElementById('table-area').innerHTML = '<div class="loading" style="color:var(--text2)">該当銘柄なし</div>';
    return;
  }

  const rows = stocks.map((s, i) => {
    const rank = offset + i + 1;
    const sc = s.score || 50;
    const mktTag = s.market === 'JP'
      ? '<span class="market-tag market-jp">JP</span>'
      : '<span class="market-tag market-us">US</span>';
    const chg = s.change_pct != null
      ? `<span class="${s.change_pct >= 0 ? 'pos' : 'neg'}">${s.change_pct >= 0 ? '+' : ''}${s.change_pct.toFixed(2)}%</span>`
      : '<span class="na">—</span>';

    return `<tr onclick="showDetail('${s.ticker}')" style="cursor:pointer">
      <td class="rank-cell">${rank}</td>
      <td>${mktTag}</td>
      <td class="ticker-cell">${s.ticker}</td>
      <td class="name-cell">${s.name || '—'}</td>
      <td><span class="sector-badge">${s.sector || '—'}</span></td>
      <td class="price-cell">${s.market === 'JP' ? '¥' : '$'}${s.price != null ? Number(s.price).toLocaleString() : '—'}</td>
      <td>${chg}</td>
      <td>${fmtMktCap(s.market_cap)}</td>
      <td>
        <div class="score-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${sc}%;background:${scoreColor(sc)}"></div></div>
          <span class="score-num" style="color:${scoreColor(sc)}">${sc}</span>
        </div>
      </td>
      <td class="hide-mobile">${s.per != null ? s.per.toFixed(1) : '<span class="na">—</span>'}</td>
      <td class="hide-mobile">${s.peg != null ? s.peg.toFixed(2) : '<span class="na">—</span>'}</td>
      <td class="hide-mobile">${s.roe != null ? `<span class="${s.roe > 0.15 ? 'pos' : s.roe < 0 ? 'neg' : ''}">${(s.roe*100).toFixed(1)}%</span>` : '<span class="na">—</span>'}</td>
      <td class="hide-mobile">${s.fcf_yield != null ? `<span class="${s.fcf_yield > 3 ? 'pos' : ''}">${s.fcf_yield.toFixed(1)}%</span>` : '<span class="na">—</span>'}</td>
      <td class="hide-mobile">${s.div_yield != null ? `$y(s.div_yield*100).toFixed(2)}%` : '<span class="na">—</span>'}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-area').innerHTML = `
    <table>
      <thead><tr>
        <th>#</th>
        <th>市場</th>
        <th onclick="sortBy('ticker')">ティッカー</th>
        <th>銘柄名</th>
        <th>セクター</th>
        <th onclick="sortBy('price')">株価</th>
        <th>前日比</th>
        <th onclick="sortBy('market_cap')">時価総額</th>
        <th onclick="sortBy('score')" class="sorted">スコア</th>
        <th onclick="sortBy('per')" class="hide-mobile">PER</th>
        <th onclick="sortBy('peg')" class="hide-mobile">PEG</th>
        <th onclick="sortBy('roe')" class="hide-mobile">ROE</th>
        <th onclick="sortBy('fcf_yield')" class="hide-mobile">FCF利回り</th>
        <th class="hide-mobile">配当利回り</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function sortBy(col) {
  document.getElementById('sort-by').value = col;
  currentPage = 1;
  loadStocks();
}

function renderPagination(total) {
  const pages = Math.ceil(total / 25);
  totalPages = pages;
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>◀</button>`;

  const range = [];
  for (let p = Math.max(1, currentPage-2); p <= Math.min(pages, currentPage+2); p++) range.push(p);
  if (range[0] > 1) { html += `<button class="page-btn" onclick="goPage(1)">1</button>`; if (range[0] > 2) html += `<span style="color:var(--text2);padding:0 4px">…</span>`; }
  range.forEach(p => {
    html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  if (range[range.length-1] < pages) { if (range[range.length-1] < pages-1) html += `<span style="color:var(--text2);padding:0 4px">…</span>`; html += `<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`; }

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>▶</button>`;
  html += `<span style="color:var(--text2);font-size:12px;margin-left:8px">${currentPage}/${pages}ページ</span>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  loadStocks();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateSectorFilter() {
  const sel = document.getElementById('sector-filter');
  const cur = sel.value;
  const sorted = [...allSectors].sort();
  sel.innerHTML = '<option value="">全セクター</option>' + sorted.map(s => `<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
}

async function showDetail(ticker) {
  document.getElementById('d-ticker').textContent = ticker;
  document.getElementById('d-name').textContent = '読み込み中...';
  document.getElementById('d-price').textContent = '';
  document.getElementById('d-tags').innerHTML = '';
  document.getElementById('d-grid').innerHTML = '';
  document.getElementById('detail-overlay').classList.add('open');

  try {
    const res = await fetch(`${API}/api/v1/stocks/${ticker}`);
    const s = await res.json();

    document.getElementById('d-name').textContent = s.name || '';
    document.getElementById('d-price').innerHTML =
      `${s.market === 'JP' ? '¥' : '$'}${s.price != null ? Number(s.price).toLocaleString() : '—'}`
      + (s.change_pct != null ? ` <span style="font-size:16px;color:${s.change_pct>=0?'var(--green)':'var(--red)'}">${s.change_pct>=0?'+':''}${s.change_pct.toFixed(2)}%</span>` : '');

    document.getElementById('d-tags').innerHTML = [
      s.sector && `<span class="detail-tag">📂 ${s.sector}</span>`,
      s.industry && `<span class="detail-tag">${s.industry}</span>`,
      s.exchange && `<span class="detail-tag">${s.exchange}</span>`,
      s.market && `<span class="detail-tag">${s.market === 'JP' ? '🇯🇵 日本株' : '🇺🇸 米国株'}</span>`,
    ].filter(Boolean).join('');

    const metrics = [
      ['スコア', s.score != null ? `<span style="color:${scoreColor(s.score)};font-size:24px">${s.score}</span>` : '—'],
      ['時価総額', s.market_cap != null ? (s.market_cap >= 1e12 ? `$${(s.market_cap/1e12).toFixed(2)}T` : `$${(s.market_cap/1e9).toFixed(1)}B`) : '—'],
      ['PER', s.per != null ? s.per.toFixed(2) : '—'],
      ['PBR', s.pbr != null ? s.pbr.toFixed(2) : '—'],
      ['PSR', s.psr != null ? s.psr.toFixed(2) : '—'],
      ['EV/EBITDA', s.ev_ebitda != null ? s.ev_ebitda.toFixed(2) : '—'],
      ['PEG', s.peg != null ? s.peg.toFixed(2) : '—'],
      ['ROE', s.roe != null ? `${(s.roe*100).toFixed(2)}%` : '—'],
      ['ROA', s.roa != null ? `${(s.roa*100).toFixed(2)}%` : '—'],
      ['粗利益率', s.gross_margin != null ? `${(s.gross_margin*100).toFixed(2)}%` : '—'],
      ['営業利益率', s.operating_margin != null ? `${(s.operating_margin*100).toFixed(2)}%` : '—'],
      ['純利益率', s.net_margin != null ? `${(s.net_margin*100).toFixed(2)}%` : '—'],
      ['FCF利回り', s.fcf_yield != null ? `${s.fcf_yield.toFixed(2)}%` : '—'],
      ['配当利回り', s.div_yield != null ? `${(s.div_yield*100).toFixed(2)}%` : '—'],
      ['D/E比率', s.de_ratio != null ? s.de_ratio.toFixed(2) : '—'],
      ['流動比率', s.current_ratio != null ? s.current_ratio.toFixed(2) : '—'],
      ['EPS', s.eps != null ? `$${s.eps.toFixed(2)}` : '—'],
      ['Beta', s.beta != null ? s.beta.toFixed(2) : '—'],
      ['Alpha', s.alpha != null ? `${s.alpha.toFixed(2)}%` : '—'],
      ['Sharpe', s.sharpe != null ? s.sharpe.toFixed(2) : '—'],
    ];

    document.getElementById('d-grid').innerHTML = metrics.map(([label, val]) => `
      <div class="detail-metric">
        <div class="detail-metric-label">${label}</div>
        <div class="detail-metric-value">${val}</div>
      </div>`).join('');

  } catch(e) {
    document.getElementById('d-name').textContent = 'エラー: ' + e.message;
  }
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetailBtn();
}
function closeDetailBtn() {
  document.getElementById('detail-overlay').classList.remove('open');
}

// Search on enter / debounce
let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; loadStocks(); }, 400);
});
document.getElementById('sector-filter').addEventListener('change', () => { currentPage = 1; loadStocks(); });
document.getElementById('sort-by').addEventListener('change', () => { currentPage = 1; loadStocks(); });
document.getElementById('sort-dir').addEventListener('change', () => { currentPage = 1; loadStocks(); });
document.getElementById('market-filter').addEventListener('change', () => { currentPage = 1; loadStocks(); });

// Initial load
loadStocks();
</script>
</body>
</html>
